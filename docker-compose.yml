version: '3.8'

services:
  jekyll:
    build: .
    ports:
      - "4000:4000"
      - "35729:35729"  # LiveReload port
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    environment:
      - JEKYLL_ENV=development
      - BUNDLE_PATH=/usr/local/bundle
      - VIDE_API_BASE=${VIDE_API_BASE:-}
      - VIDE_DOCUMENTS=${VIDE_DOCUMENTS:-}
    command: sh -c "sh /srv/jekyll/scripts/generate-runtime-config.sh /srv/jekyll/scripts/runtime-config.template.js /srv/jekyll/runtime-config.js && bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling"
    stdin_open: true
    tty: true

  # Build service for production builds
  build:
    build: .
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    environment:
      - JEKYLL_ENV=production
      - BUNDLE_PATH=/usr/local/bundle
      - VIDE_API_BASE=${VIDE_API_BASE:-}
      - VIDE_DOCUMENTS=${VIDE_DOCUMENTS:-}
    command: sh -c "sh /srv/jekyll/scripts/generate-runtime-config.sh /srv/jekyll/scripts/runtime-config.template.js /srv/jekyll/runtime-config.js && bundle exec jekyll build"
    profiles:
      - build

volumes:
  bundle_cache:
