<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Transcript Viewer</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Fluid Transcript Viewer</h1>
      <nav class="examples-nav">
        <span class="examples-label">Examples:</span>
        <a href="?page=1&zone=6" class="example-link">NK 1/6</a>
        <a href="?page=11&zone=3" class="example-link">NK 11/3</a>
        <a href="?page=42&zone=1" class="example-link">NK 42/1</a>
      </nav>
    </header>

    <main class="main">
      <div class="viewer-container" id="viewer-container">
        <div class="openseadragon-container" id="openseadragon-container">
          <div class="loading" id="loading">Loading...</div>
        </div>
      </div>

      <div class="controls">
        <div class="slider-container">
          <div class="slider-track">
            <div class="slider-stops" id="slider-stops">
              <!-- Stop indicators will be generated by JS -->
            </div>
            <input
              type="range"
              id="animation-slider"
              class="slider"
              min="0"
              max="100"
              value="0"
              step="0.1"
            >
          </div>
          <div class="slider-labels">
            <span class="step-label">Step 1</span>
            <span class="step-label">Step 8</span>
          </div>
        </div>
        <div class="step-indicator">
          Current position: <span id="current-step">1</span>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Beethovens Werkstatt – Fluid Transcript Demo</p>
    </footer>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
