server {
  listen 80;
  server_name _;

  # Root-Verzeichnis mit allen statischen Dateien
  root /usr/share/nginx/html;
  index index.html;

  # SPA-Island für /facs/
  #
  # Alles unter /facs/ wird, falls keine echte Datei/Dir existiert,
  # auf /facs/index.html geroutet.
  location /facs/ {
      try_files $uri $uri/ /facs/index.html;
  }

  # SPA-Island für /transcription/
  #
  # Alles unter /transcription/ wird, falls keine echte Datei/Dir existiert,
  # auf /transcription/index.html geroutet.
  location /transcription/ {
      try_files $uri $uri/ /transcription/index.html;
  }

  # Standard: statische Auslieferung aller anderen Dateien
  location / {
      try_files $uri $uri/ =404;
  }
}
