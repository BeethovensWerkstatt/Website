# Digitale Editionen, Software, Berichte und Dokumentation je Modul
# Wird auf /module/ in der Sektion "Digitale Editionen," ausgegeben.
#
# Felder pro Eintrag:
#   title:          Anzeigename (Pflicht)
#   url:            Externer oder interner Link (optional, wenn Eintrag nur Unterinstanzen hat)
#   beschreibung:   Kurze Erläuterung, 1–2 Sätze (optional)
#   werke:          Optionale Liste enthaltener Werke / direkter Einstiege
#                   (je Werk: title, optional url)
#                   Beispiel:
#                     werke:
#                       - title: "Lied Neue Liebe, neues Leben, op. 75/2"
#                       - title: "Duett mit zwei obligaten Augengläsern, WoO 32"
#                         url: "/works/duett-mit-zwei-obligaten-augen-glaesern/"
#   screenshot:     Optionaler Teaser-Screenshot zur Anwendung (Pfad unter /assets/...)
#   screenshot_alt: Optionaler Alternativtext für den Screenshot
#   dokumentation:  Interner Link zu einer Dokumentationsseite im Projekt (optional)
#   news:           Optionaler Link zum Newsbeitrag (direkte URL oder _posts-Dateipfad)

modul_1:
  editionen_software:
    - title: "VideApp-Var"
      beschreibung: "Webanwendung zur Darstellung genetischer Prozesse."
      url: "https://videapp.beethovens-werkstatt.de"
      screenshot: "/assets/images/module/modul-1.jpg"
      screenshot_alt: "Screenshot der VideApp-Var aus Modul 1"
      werke:
        - title: "Lied Neue Liebe, neues Leben, op. 75/2"
        - title: "Duett mit zwei obligaten Augengläsern, WoO 32"
        - title: "8. Symphonie in F-Dur, op. 93"
      dokumentation: "/dokumentation/videapp-var/" # @todo "Tour"-Inhalte in eine .md Datei überführen

    - title: "Prototyp 1"
      beschreibung: "Fallstudie zu Variantendarstellung für die \"Sonate für Klavier c-Moll, op. 111.\""
      dokumentation: "/dokumentation/prototyp-1/"
      url: "https://demo.beethovens-werkstatt.de/index.html"

    - title: "Prototyp 2"
      beschreibung: "Fallstudie zu Schreibschichten und Invarianz für das Streichquartett C-Dur, op. 59/3."
      dokumentation: "/dokumentation/prototyp-2/"
      url: "https://demo2.beethovens-werkstatt.de/index.html"
      news: "/_posts/2015-11-13-beispiel-op-593/"

    - title: "Genetic Sandbox"
      beschreibung: "Interaktive Sandbox zur Erprobung von Variantenabfolgen und Schreibprozessen."
      werke:
        - title: "Sandbox 1: Streichquartett C-Dur, op. 59/3"
          url: "https://beethovens-werkstatt.de/sandbox/op59.3/index.html"
        - title: "Sandbox 2: Lied Neue Liebe, neues Leben, op. 75/2"
          url: "https://beethovens-werkstatt.de/sandbox/op75.2/5r/index.html"
      dokumentation: "/dokumentation/genetic-sandbox/"

  berichte:
    - title: "Abschlussbericht Modul 1"
      url: "/modul-1/abschlussbericht-modul-1/"
      typ: "Bericht"
      date: "2017-07-04"
      author: "Beethovens Werkstatt"

    - title: "Softwareentwicklung Modul 1"
      url: "/modul-1/softwareentwicklung-2017/"
      beschreibung: "Dokumentation und Zwischenbilanz (2014–2017): Zu den Herausforderungen der Softwareentwicklung."
      typ: "Lessons Learned"
      date: "2017-05-04"
      author: "Johannes Kepper"

    - title: "Prototypen"
